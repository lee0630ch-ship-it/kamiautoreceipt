<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 영수증 정산기 (즉시분석형)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ExcelJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <!-- FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- LocalForage (IndexedDB) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-12">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
            <h1 class="text-xl font-bold text-center">🧾 모바일 정산기 Pro</h1>
        </header>

        <main class="p-4 space-y-6">
            <!-- 1. API Key -->
            <section class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h2 class="font-bold text-gray-700 mb-2">1. 구글 Gemini API 키</h2>
                <input type="password" id="apiKey" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="API 키를 입력하세요">
            </section>

            <!-- 2. 영수증 업로드 (즉시 분석) -->
            <section class="bg-blue-50 p-4 rounded-xl border border-blue-200 border-l-4 border-l-blue-500">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-bold text-blue-800">2. 영수증 촬영/추가 (즉시 분석)</h2>
                    <span id="receiptCountBadge" class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full font-bold">0건 보관 중</span>
                </div>
                
                <!-- 3가지 업로드 옵션 -->
                <div class="grid grid-cols-3 gap-2 mb-2" id="uploadButtons">
                    <label class="block text-center bg-white text-blue-600 p-3 rounded-lg border-2 border-dashed border-blue-400 cursor-pointer active:bg-blue-50 transition shadow-sm">
                        <span class="text-2xl block mb-1">📸</span>
                        <span class="text-xs font-bold">바로 촬영</span>
                        <input type="file" class="hidden file-uploader" accept="image/*" capture="environment">
                    </label>
                    <label class="block text-center bg-white text-blue-600 p-3 rounded-lg border-2 border-dashed border-blue-400 cursor-pointer active:bg-blue-50 transition shadow-sm">
                        <span class="text-2xl block mb-1">🖼️</span>
                        <span class="text-xs font-bold">갤러리</span>
                        <input type="file" class="hidden file-uploader" accept="image/*" multiple>
                    </label>
                    <label class="block text-center bg-white text-blue-600 p-3 rounded-lg border-2 border-dashed border-blue-400 cursor-pointer active:bg-blue-50 transition shadow-sm">
                        <span class="text-2xl block mb-1">📄</span>
                        <span class="text-xs font-bold">PDF 첨부</span>
                        <input type="file" class="hidden file-uploader" accept="application/pdf" multiple>
                    </label>
                </div>
                <p class="text-xs text-gray-500 mt-2 text-center" id="uploadText">💡 업로드 즉시 텍스트로 변환되어 기기에 영구 저장됩니다.</p>
                
                <!-- 분석된 영수증 목록 -->
                <div id="receiptListContainer" class="mt-3 max-h-48 overflow-y-auto space-y-2 empty:hidden"></div>
            </section>

            <!-- 3. 기본 정보 -->
            <section class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h2 class="font-bold text-gray-700 mb-2">3. 기본 출장 정보</h2>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="author" placeholder="작성자" class="w-1/2 p-2 border rounded-lg text-sm">
                    <input type="text" id="traveler" placeholder="출장인" class="w-1/2 p-2 border rounded-lg text-sm">
                </div>
                <input type="text" id="vehicle" placeholder="이용차량 (예: 자차, 스포티지 등)" class="w-full p-2 border rounded-lg text-sm">
            </section>

            <!-- 4. 출장 목적 -->
            <section class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h2 class="font-bold text-gray-700 mb-2">4. 출장목적 입력</h2>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" id="partner" placeholder="파트너사" class="w-1/2 p-2 border rounded-lg text-sm">
                        <input type="text" id="company" placeholder="업체명" class="w-1/2 p-2 border rounded-lg text-sm">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="location" placeholder="소재지" class="w-1/2 p-2 border rounded-lg text-sm">
                        <input type="text" id="equipment" placeholder="장비명" class="w-1/2 p-2 border rounded-lg text-sm">
                    </div>
                    <div class="flex gap-2 items-center">
                        <select id="paid" class="w-1/3 p-2 border rounded-lg text-sm bg-white text-gray-700">
                            <option value="무상">무상</option>
                            <option value="유상">유상</option>
                        </select>
                        <input type="text" id="task" placeholder="업무내용" class="w-2/3 p-2 border rounded-lg text-sm">
                    </div>
                    <div class="flex gap-2 items-center">
                        <span class="text-sm font-semibold text-gray-600 pl-1 w-1/3">구분(J열):</span>
                        <select id="purposeCategory" class="w-2/3 p-2 border rounded-lg text-sm bg-white text-gray-700">
                            <option value="KAWR">KAWR</option>
                            <option value="유상">유상</option>
                            <option value="무상">무상</option>
                            <option value="설치">설치</option>
                            <option value="고객관리">고객관리</option>
                            <option value="교육">교육</option>
                            <option value="영업">영업</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                    <button id="addPurposeBtn" class="w-full bg-gray-200 text-gray-700 py-2 rounded-lg font-semibold active:bg-gray-300 transition">➕ 추가하기</button>
                </div>
                <!-- 출장 목적 목록 표시 -->
                <ul id="purposeList" class="mt-3 text-sm text-gray-600 bg-white border rounded-lg min-h-[40px] empty:hidden"></ul>
            </section>

            <!-- 5. 로그 영역 -->
            <section class="bg-gray-900 rounded-xl p-4 shadow-inner">
                <div id="logArea" class="log-container h-32 overflow-y-auto text-xs text-green-400 font-mono space-y-1">
                    <div>시스템 대기 중... 사진을 촬영하면 즉시 분석합니다.</div>
                </div>
            </section>

            <!-- 6. 실행 버튼 -->
            <button id="startBtn" class="w-full bg-green-600 text-white text-lg font-bold py-4 rounded-xl shadow-lg active:bg-green-700 transition disabled:bg-gray-400 disabled:shadow-none">
                🚀 최종 정산서 만들기
            </button>
        </main>
    </div>

    <!-- 일반 알림 모달 -->
    <div id="alertModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full">
            <h3 class="font-bold text-lg mb-2 text-gray-800" id="alertTitle">알림</h3>
            <p class="text-gray-600 mb-6 text-sm break-keep" id="alertMessage">메시지 내용</p>
            <button id="alertCloseBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">확인</button>
        </div>
    </div>

    <!-- 숙박지역 입력 모달 (파이썬과 동일 기능) -->
    <div id="regionModal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full">
            <h3 class="font-bold text-blue-700 text-lg mb-2">🏨 숙박지역 입력</h3>
            <p class="text-gray-600 mb-4 text-sm break-keep">숙박비 영수증이 발견되었습니다.<br>해당 일자의 숙박 지역을 기입해 주세요.</p>
            <div id="regionInputsContainer" class="space-y-3 mb-6 max-h-48 overflow-y-auto p-1">
                <!-- 동적 생성 -->
            </div>
            <button id="regionSubmitBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold active:bg-green-700">확인 및 정산서 완성</button>
        </div>
    </div>

    <script>
        // State
        let purposes = []; // const에서 let으로 변경
        let analyzedReceipts = []; 

        // Elements
        const els = {
            apiKey: document.getElementById('apiKey'),
            uploadButtons: document.getElementById('uploadButtons'),
            uploadText: document.getElementById('uploadText'),
            receiptCountBadge: document.getElementById('receiptCountBadge'),
            receiptListContainer: document.getElementById('receiptListContainer'),
            
            author: document.getElementById('author'),
            traveler: document.getElementById('traveler'),
            vehicle: document.getElementById('vehicle'),
            
            addPurposeBtn: document.getElementById('addPurposeBtn'),
            purposeList: document.getElementById('purposeList'),
            logArea: document.getElementById('logArea'),
            startBtn: document.getElementById('startBtn'),
            
            alertModal: document.getElementById('alertModal'),
            regionModal: document.getElementById('regionModal'),
            regionInputsContainer: document.getElementById('regionInputsContainer')
        };

        // Init
        window.onload = async () => {
            const saved = JSON.parse(localStorage.getItem('receipt_app_config') || '{}');
            
            // 텍스트 정보 불러오기
            if (saved.apiKey) els.apiKey.value = saved.apiKey;
            if (saved.author) els.author.value = saved.author;
            if (saved.traveler) els.traveler.value = saved.traveler;
            if (saved.vehicle) els.vehicle.value = saved.vehicle;
            
            // 출장 목적 리스트 불러오기
            if (saved.purposes && Array.isArray(saved.purposes)) {
                purposes = saved.purposes;
                updatePurposeUI();
            }

            localforage.config({ name: 'ReceiptAppDB', storeName: 'saved_receipts' });

            // 기존에 분석해둔 영수증 데이터 불러오기
            try {
                const stored = await localforage.getItem('analyzed_receipts');
                if (stored && stored.length > 0) {
                    analyzedReceipts = stored;
                    updateReceiptUI();
                    addLog(`[복구] 저장된 데이터(글자, 목적, 영수증)를 완벽하게 불러왔습니다.`);
                }
            } catch (err) {
                console.error(err);
            }

            // [신규] 실시간 자동 저장 이벤트 (글자를 치는 즉시 저장됨)
            [els.apiKey, els.author, els.traveler, els.vehicle].forEach(input => {
                input.addEventListener('input', saveConfig);
            });
        };

        // 정보 저장 함수 (목적 리스트도 함께 저장)
        function saveConfig() {
            localStorage.setItem('receipt_app_config', JSON.stringify({
                apiKey: els.apiKey.value.trim(),
                author: els.author.value.trim(),
                traveler: els.traveler.value.trim(),
                vehicle: els.vehicle.value.trim(),
                purposes: purposes // 목적 배열도 저장
            }));
        }

        // Helpers
        function showAlert(title, message) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = message;
            els.alertModal.classList.remove('hidden');
        }
        document.getElementById('alertCloseBtn').onclick = () => els.alertModal.classList.add('hidden');

        function addLog(msg, isError = false) {
            const div = document.createElement('div');
            div.innerText = msg;
            if (isError) div.className = 'text-red-400 font-bold';
            els.logArea.appendChild(div);
            els.logArea.scrollTop = els.logArea.scrollHeight;
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.toString().replace(/^data:(.*,)?/, ''));
                reader.onerror = error => reject(error);
            });
        }

        // 즉시 분석 로직 (3가지 업로드 버튼 모두 연동)
        const uploaderInputs = document.querySelectorAll('.file-uploader');
        
        uploaderInputs.forEach(input => {
            input.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const apiKey = els.apiKey.value.trim();
                if (!apiKey) {
                    e.target.value = ''; // 초기화
                    return showAlert('API 키 오류', '상단에 구글 Gemini API 키를 먼저 입력해주세요.');
                }

                // 버튼 비활성화 및 UI 변경
                uploaderInputs.forEach(inp => inp.disabled = true);
                els.uploadButtons.classList.add('opacity-50', 'pointer-events-none');
                els.uploadText.innerText = "⏳ AI 분석 중... 잠시만요!";
                els.uploadText.classList.add('text-blue-600', 'font-bold');

                try {
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        addLog(`[${i+1}/${files.length}] ${file.name} 분석 시작...`);
                        
                        const base64Str = await fileToBase64(file);
                        
                        try {
                            const dataArray = await callGeminiAPI(base64Str, file.type || 'image/jpeg', apiKey);
                            
                            dataArray.forEach(item => {
                                item.id = Date.now() + Math.random();
                                analyzedReceipts.push(item);
                                addLog(`  └ 📄 ${item.date} | ${item.category} | ${item.amount}원`);
                            });
                            
                            // 성공할 때마다 즉시 영구 저장
                            await localforage.setItem('analyzed_receipts', analyzedReceipts);
                            updateReceiptUI();
                            
                        } catch (apiErr) {
                            addLog(`  └ ❌ 실패: ${apiErr.message}`, true);
                            if (apiErr.message.includes('quota') || apiErr.message.includes('429')) {
                                showAlert('API 한도 초과', '잠시 후 다시 시도하거나 내일 이어서 찍어주세요.');
                                break;
                            }
                        }

                        // 여러 장 올렸을 때 API 한도 보호를 위한 대기시간 (3.5초)
                        if (i < files.length - 1) {
                            addLog(`  ⏳ 과부하 방지 3.5초 대기...`);
                            await new Promise(r => setTimeout(r, 3500));
                        }
                    }
                    addLog(`✅ 사진 처리 완료!`);
                } catch (err) {
                    addLog(`[오류] ${err.message}`, true);
                } finally {
                    // 완료 후 버튼 원상복구
                    uploaderInputs.forEach(inp => inp.disabled = false);
                    els.uploadButtons.classList.remove('opacity-50', 'pointer-events-none');
                    els.uploadText.innerText = "💡 업로드 즉시 텍스트로 변환되어 기기에 영구 저장됩니다.";
                    els.uploadText.classList.remove('text-blue-600', 'font-bold');
                    e.target.value = ''; // 동일 파일 재선택을 위해 초기화
                }
            });
        });

        // 영수증 UI 업데이트
        function updateReceiptUI() {
            els.receiptCountBadge.innerText = `${analyzedReceipts.length}건 보관 중`;
            
            let html = '';
            analyzedReceipts.forEach((r, idx) => {
                let displayDate = r.date;
                try {
                    const d = new Date(r.date.replace(/\./g, '-'));
                    if(!isNaN(d)) displayDate = `${d.getMonth()+1}/${d.getDate()}`;
                } catch(e) {}
                
                const amt = Number(String(r.amount).replace(/,/g, '').replace('원','')).toLocaleString();
                
                html += `
                    <div class="flex justify-between items-center bg-white p-2 border border-blue-100 rounded-lg text-sm shadow-sm">
                        <div class="truncate w-3/4">
                            <span class="font-bold text-gray-700 mr-2">${displayDate}</span>
                            <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-1 py-0.5 rounded mr-1">${r.category}</span>
                            <span class="text-gray-600">${r.merchant}</span>
                            <span class="font-bold text-gray-800 ml-1">${amt}원</span>
                        </div>
                        <button onclick="removeReceipt(${idx})" class="text-red-500 text-xs font-bold px-2 py-1 bg-red-50 rounded hover:bg-red-100">삭제</button>
                    </div>
                `;
            });
            els.receiptListContainer.innerHTML = html;
        }

        window.removeReceipt = async function(idx) {
            analyzedReceipts.splice(idx, 1);
            await localforage.setItem('analyzed_receipts', analyzedReceipts);
            updateReceiptUI();
            addLog(`[안내] 영수증 데이터 1건이 삭제되었습니다.`);
        };

        // 출장 목적 UI 업데이트 (삭제 버튼 포함)
        function updatePurposeUI() {
            els.purposeList.innerHTML = '';
            purposes.forEach((p, idx) => {
                const li = document.createElement('li');
                li.className = 'p-2 text-gray-700 flex items-center justify-between gap-2 border-b last:border-b-0';
                li.innerHTML = `
                    <div class="flex items-start gap-2 truncate">
                        <span class="bg-gray-100 px-1.5 py-0.5 rounded font-bold text-xs shrink-0">${p.category}</span> 
                        <span class="truncate text-sm">${p.detail}</span>
                    </div>
                    <button onclick="removePurpose(${idx})" class="text-red-500 text-xs font-bold px-2 py-1 bg-red-50 rounded hover:bg-red-100 shrink-0">삭제</button>
                `;
                els.purposeList.appendChild(li);
            });
        }

        // 출장 목적 개별 삭제
        window.removePurpose = function(idx) {
            purposes.splice(idx, 1);
            updatePurposeUI();
            saveConfig(); // 지울 때도 자동 저장
        }

        // 출장 목적 추가
        els.addPurposeBtn.addEventListener('click', () => {
            const partner = document.getElementById('partner').value.trim();
            const company = document.getElementById('company').value.trim();
            const location = document.getElementById('location').value.trim();
            const equipment = document.getElementById('equipment').value.trim();
            const paid = document.getElementById('paid').value;
            const task = document.getElementById('task').value.trim();
            const category = document.getElementById('purposeCategory').value; // J열

            if (!partner && !company && !location && !equipment && !task) return;

            const detailStr = `${partner}/${company}/${location}/${equipment}/${paid}(${task})`;
            
            purposes.push({ detail: detailStr, category: category });
            updatePurposeUI();
            saveConfig(); // 추가할 때 자동 저장

            // 입력 칸 초기화
            ['partner', 'company', 'location', 'equipment', 'task'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('paid').value = '무상';
        });

        // Gemini API 호출 함수
        async function callGeminiAPI(fileBase64, mimeType, apiKey) {
            const prompt = `
            이 문서(이미지/PDF)에는 한 개 이상의 영수증이 있습니다. 
            모든 영수증 정보를 추출해서 반드시 JSON 배열(Array) 형식으로만 답변하세요.
            
            1. date: 결제일자 (YYYY-MM-DD)
            2. merchant: 상호명
            3. amount: 총 결제 금액 (숫자만)
            4. category: 다음 규칙에 따라 하나만 선택
               - '야놀자','여기어때','놀유니버스','모텔','호텔','스테이','여관' -> "숙박비"
               - '주유소','GS칼텍스','SK','S-OIL','HD현대' -> "유대"
               - '주차장','톨게이트','요금소','하이패스' -> "통행료,주차"
               - 'KTX','SRT','기차','고속버스','코레일','지하철','택시' -> "차비"
               - 'CU','GS25','세븐일레븐','이마트24','편의점', 식당, 카페 -> "식대"
               - 그 외 -> "기타"
               
            예시: [{"date": "2023-10-25", "merchant": "CU역삼점", "amount": 1500, "category": "식대"}]`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: mimeType, data: fileBase64 } }] }],
                generationConfig: { responseMimeType: "application/json" }
            };

            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error("API 요청 실패");

            const result = await response.json();
            let data = JSON.parse(result.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
            return Array.isArray(data) ? data : [data];
        }

        // ==========================================
        // 최종 엑셀 정산 생성 로직
        // ==========================================
        els.startBtn.addEventListener('click', async () => {
            if (document.getElementById('partner').value.trim()) els.addPurposeBtn.click();
            saveConfig();

            if (analyzedReceipts.length === 0) return showAlert('경고', '저장된 영수증 데이터가 없습니다.');

            // 날짜/MM/DD 형태로 표준화
            analyzedReceipts.forEach(item => {
                let dStr = item.date;
                if (dStr) {
                    try {
                        const d = new Date(dStr.replace(/\./g, '-'));
                        if(!isNaN(d)) dStr = `${d.getMonth()+1}/${d.getDate()}`;
                    } catch(e) {}
                }
                item.display_date = dStr;
            });
            analyzedReceipts.sort((a, b) => (a.date || '9999').localeCompare(b.date || '9999'));

            // 숙박비 여부 체크
            let accomDates = [];
            analyzedReceipts.forEach(r => {
                if (r.category === '숙박비' && r.display_date && !accomDates.includes(r.display_date)) {
                    accomDates.push(r.display_date);
                }
            });

            if (accomDates.length > 0) {
                // 숙박 팝업 띄우기
                els.regionInputsContainer.innerHTML = '';
                accomDates.forEach(d => {
                    els.regionInputsContainer.innerHTML += `
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-bold text-gray-700 w-1/2">📅 ${d} 숙박지:</label>
                            <input type="text" id="region_${d}" class="w-1/2 p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="예: 부산">
                        </div>
                    `;
                });
                els.regionModal.classList.remove('hidden');

                document.getElementById('regionSubmitBtn').onclick = () => {
                    const regionMap = {};
                    accomDates.forEach(d => {
                        regionMap[d] = document.getElementById(`region_${d}`).value.trim();
                    });
                    els.regionModal.classList.add('hidden');
                    generateAndShareExcel(regionMap);
                };
            } else {
                // 숙박비가 없으면 바로 생성
                generateAndShareExcel({});
            }
        });

        async function generateAndShareExcel(regionMap) {
            els.startBtn.disabled = true;
            els.startBtn.innerText = '엑셀 생성 중...';
            addLog('\n--- 엑셀 데이터 매핑을 시작합니다 ---');

            try {
                const workbook = new ExcelJS.Workbook();
                const sheet = workbook.addWorksheet('경비정산서');

                sheet.columns = [
                    { width: 5 }, { width: 12 }, { width: 15 }, { width: 15 }, 
                    { width: 15 }, { width: 15 }, { width: 15 }, { width: 15 }, 
                    { width: 15 }, { width: 15 }, { width: 15 }
                ];

                const today = new Date();
                
                sheet.getCell('C2').value = '국내출장경비 정산서';
                sheet.getCell('C2').font = { size: 16, bold: true };
                
                sheet.getCell('I6').value = '작성일자';
                sheet.getCell('J6').value = `${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

                sheet.getCell('B6').value = '작성자';
                sheet.getCell('C6').value = els.author.value.trim();
                sheet.getCell('B7').value = '출장인';
                sheet.getCell('C7').value = els.traveler.value.trim();
                sheet.getCell('H7').value = '이용차량';
                sheet.getCell('I7').value = els.vehicle.value.trim();

                // 기간 계산
                let validDates = analyzedReceipts.map(r => new Date(r.date.replace(/\./g, '-')).getTime()).filter(t => !isNaN(t));
                if(validDates.length > 0) {
                    const uniqueDates = [...new Set(validDates)].sort((a,b) => a - b).map(t => new Date(t));
                    let blocks = [], currentBlock = [uniqueDates[0]];
                    for(let i=1; i<uniqueDates.length; i++) {
                        if (Math.round((uniqueDates[i] - uniqueDates[i-1]) / 86400000) === 1) currentBlock.push(uniqueDates[i]);
                        else { blocks.push(currentBlock); currentBlock = [uniqueDates[i]]; }
                    }
                    blocks.push(currentBlock);

                    let totalNights=0, totalDays=0, wkdayN=0, wkendN=0, wkdayC=0, wkendC=0;
                    let periodStrings = [];

                    blocks.forEach(block => {
                        const sDt = block[0], eDt = block[block.length-1];
                        const bNights = Math.round((eDt - sDt) / 86400000);
                        totalNights += bNights; totalDays += (bNights + 1);

                        if(bNights === 0) periodStrings.push(`${sDt.getMonth()+1}/${sDt.getDate()}`);
                        else {
                            periodStrings.push(`${sDt.getMonth()+1}/${sDt.getDate()}~${eDt.getMonth()+1}/${eDt.getDate()}`);
                            let bWkday=0, bWkend=0;
                            for(let n=0; n<bNights; n++) {
                                const dNum = new Date(sDt.getTime() + n*86400000).getDay();
                                if(dNum===0 || dNum===5 || dNum===6) bWkend++; else bWkday++;
                            }
                            wkdayN += bWkday; wkendN += bWkend;
                            wkdayC += Math.max(0, bWkday-1); wkendC += Math.max(0, bWkend-1);
                        }
                    });

                    sheet.getCell('B8').value = '출장일(기간)';
                    sheet.getCell('C8').value = totalNights === 0 ? `${periodStrings.join(', ')} (1일)` : `${periodStrings.join(', ')} (총 ${totalNights}박 ${totalDays}일)`;
                    sheet.getCell('A9').value = '박수당';
                    sheet.getCell('B9').value = '평일';
                    sheet.getCell('C9').value = `( ${wkdayN} 박 / 연속박수 ${wkdayC} 박 )`;
                    sheet.getCell('B10').value = '휴일';
                    sheet.getCell('C10').value = `( ${wkendN} 박 / 연속박수 ${wkendC} 박 )`;
                }

                // 출장목적 (C열 내용, J열 구분)
                sheet.getCell('B14').value = '출장목적';
                sheet.getCell('B14').font = { bold: true };
                purposes.forEach((p, idx) => {
                    const row = 14 + idx;
                    sheet.getCell(`C${row}`).value = p.detail;
                    sheet.mergeCells(`C${row}:H${row}`);
                    sheet.getCell(`J${row}`).value = p.category; // 구분 J열
                });

                // 표 헤더
                const headers = ['No', '일자', '유대', '통행료,주차', '차비', '숙박비', '식대', '기타', '계', '현금', '비고'];
                headers.forEach((h, idx) => {
                    const cell = sheet.getCell(24, idx + 1);
                    cell.value = h;
                    cell.font = { bold: true };
                    cell.alignment = { horizontal: 'center' };
                    cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF2F2F2' } };
                });

                // 데이터 기입 (파이썬 매핑 완벽 복제)
                let rIdx = 25, totalAmt = 0;
                analyzedReceipts.forEach((data, i) => {
                    const amt = parseInt(String(data.amount).replace(/,/g, '').replace('원', '')) || 0;
                    totalAmt += amt;
                    const cat = data.category;

                    sheet.getCell(rIdx, 1).value = i + 1;           // A: No
                    sheet.getCell(rIdx, 2).value = data.display_date; // B: 일자
                    sheet.getCell(rIdx, 9).value = amt;             // I: 계

                    if (cat === "유대") sheet.getCell(rIdx, 3).value = amt; // C
                    else if (["통행료,주차", "통행료", "주차"].includes(cat)) sheet.getCell(rIdx, 4).value = amt; // D
                    else if (cat === "차비") sheet.getCell(rIdx, 5).value = amt; // E
                    else if (cat === "숙박비") {
                        sheet.getCell(rIdx, 6).value = amt; // F
                        if (regionMap[data.display_date]) {
                            sheet.getCell(rIdx, 11).value = regionMap[data.display_date]; // K열 비고란!
                        }
                    }
                    else if (cat === "식대") sheet.getCell(rIdx, 7).value = amt; // G
                    else sheet.getCell(rIdx, 8).value = amt; // H: 기타

                    for(let c=1; c<=11; c++) {
                        const cell = sheet.getCell(rIdx, c);
                        cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                        if(c===9) cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFFE0' } };
                    }
                    rIdx++;
                });

                // 합계 행
                sheet.getCell(rIdx, 2).value = '합계';
                sheet.getCell(rIdx, 2).font = { bold: true };
                sheet.getCell(rIdx, 9).value = totalAmt;
                sheet.getCell(rIdx, 9).font = { bold: true };

                // 저장 및 초기화
                const fileName = `국내출장경비정산서_${els.author.value.trim()}_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.xlsx`;
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                if (navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, { type: blob.type })] })) {
                    try {
                        await navigator.share({ files: [new File([blob], fileName, { type: blob.type })] });
                        addLog('🎉 엑셀 생성 및 공유 완료!');
                    } catch (e) {
                        saveAs(blob, fileName);
                    }
                } else {
                    saveAs(blob, fileName);
                    showAlert('완료', '엑셀 파일이 기기에 다운로드 되었습니다!');
                }

                // 분석 완료 후 데이터베이스 초기화
                analyzedReceipts = [];
                await localforage.removeItem('analyzed_receipts');
                updateReceiptUI();
                addLog('✨ 정산이 완료되어 영수증 보관함을 깔끔하게 비웠습니다.');

                // 목적도 정산이 끝났으므로 비울지 유지할지는 선택사항이나,
                // 다음 출장을 위해 남겨두는 게 보통 더 편리하므로 목적은 지우지 않습니다.

            } catch (err) {
                addLog(`[오류] 엑셀 생성 중 오류: ${err.message}`, true);
            } finally {
                els.startBtn.disabled = false;
                els.startBtn.innerText = '🚀 최종 정산서 만들기';
            }
        }
    </script>
</body>
